<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink: #0f1117;
            --paper: #f5f0e8;
            --accent: #c8410a;
            --accent-light: #f0651e;
            --muted: #7a7468;
            --border: #d4cfc4;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--paper);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-image:
                radial-gradient(ellipse at 15% 50%, rgba(200, 65, 10, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 85% 20%, rgba(200, 65, 10, 0.05) 0%, transparent 50%);
        }

        .container {
            max-width: 600px;
            text-align: center;
            animation: fadeUp 0.8s ease both;
        }

        .badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent);
            border: 1px solid rgba(200, 65, 10, 0.3);
            padding: 0.35rem 1rem;
            border-radius: 999px;
            margin-bottom: 2rem;
            background: rgba(200, 65, 10, 0.05);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 7vw, 4rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1.25rem;
            color: var(--ink);
        }

        h1 span {
            color: var(--accent);
        }

        p {
            font-size: 1.05rem;
            font-weight: 300;
            color: var(--muted);
            line-height: 1.7;
            max-width: 440px;
            margin: 0 auto 2.5rem;
        }

        .btn {
            display: inline-block;
            padding: 0.9rem 2.5rem;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.03em;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(200, 65, 10, 0.35);
        }

        .btn:hover {
            background: var(--accent-light);
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(200, 65, 10, 0.45);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--ink);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--muted);
            font-weight: 400;
            margin-top: 0.2rem;
            letter-spacing: 0.05em;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="badge">ML-Powered Prediction</div>
    <h1>Predict Student<br><span>Math Performance</span></h1>
    <p>An end-to-end machine learning model that predicts a student's mathematics score based on demographic and academic factors.</p>
    <a href="/predictdata" class="btn">Start Predicting →</a>

    <div class="stats">
        <div class="stat-item">
            <div class="stat-value">88%</div>
            <div class="stat-label">Model Accuracy</div>
        </div>
        <div class="stat-item">
            <div class="stat-value">7</div>
            <div class="stat-label">Input Features</div>
        </div>
        <div class="stat-item">
            <div class="stat-value">6</div>
            <div class="stat-label">Models Trained</div>
        </div>
    </div>
</div>

</body>
</html>
